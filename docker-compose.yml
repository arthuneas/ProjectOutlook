version: '3.8'

services:
  node1:
    build: .
    volumes:
      - ./node1_data:/app/shared_folder
    environment:
      - NODE_NAME=Node1
      - TCP_PORT=5001
      - SEED_NODES=node2:5001,node3:5001
    networks:
      - sync_net

  node2:
    build: .
    volumes:
      - ./node2_data:/app/shared_folder
    environment:
      - NODE_NAME=Node2
      - TCP_PORT=5001
      - SEED_NODES=node1:5001,node3:5001
    networks:
      - sync_net

  node3:
    build: .
    volumes:
      - ./node3_data:/app/shared_folder
    environment:
      - NODE_NAME=Node3
      - TCP_PORT=5001
      - SEED_NODES=node1:5001,node2:5001
    networks:
      - sync_net

networks:
  sync_net:
    driver: bridge
